server:
  listen: ":8080"
  admin_listen: ":8081"
  read_timeout: "30s"
  write_timeout: "300s"
  idle_timeout: "120s"

database:
  path: "./data/gateway.db"

log:
  level: "info"
  payload_retention_days: 7

pricing:
  # Standard text-token prices only.
  # This gateway does not model cached-input, prompt cache write/read,
  # batch pricing, image/audio pricing, or long-context tier premiums.

  # OpenAI
  - model: "gpt-5.2-pro*"
    input_per_million: 21.00
    output_per_million: 168.00
  - model: "gpt-5.2-codex*"
    input_per_million: 1.75
    output_per_million: 14.00
  - model: "gpt-5.2*"
    input_per_million: 1.75
    output_per_million: 14.00
  - model: "gpt-5-pro*"
    input_per_million: 15.00
    output_per_million: 120.00
  - model: "gpt-5-mini*"
    input_per_million: 0.25
    output_per_million: 2.00
  - model: "gpt-5-nano*"
    input_per_million: 0.05
    output_per_million: 0.40
  - model: "gpt-5*"
    input_per_million: 1.25
    output_per_million: 10.00
  - model: "gpt-4.1-mini*"
    input_per_million: 0.40
    output_per_million: 1.60
  - model: "gpt-4.1-nano*"
    input_per_million: 0.10
    output_per_million: 0.40
  - model: "gpt-4.1*"
    input_per_million: 2.00
    output_per_million: 8.00
  - model: "gpt-4o-mini*"
    input_per_million: 0.15
    output_per_million: 0.60
  - model: "gpt-4o*"
    input_per_million: 2.50
    output_per_million: 10.00

  # Anthropic
  - model: "claude-opus-4-6*"
    input_per_million: 5.00
    output_per_million: 25.00
  - model: "claude-opus-4-5*"
    input_per_million: 5.00
    output_per_million: 25.00
  - model: "claude-opus-4-1*"
    input_per_million: 15.00
    output_per_million: 75.00
  - model: "claude-opus-4-*"
    input_per_million: 15.00
    output_per_million: 75.00
  - model: "claude-sonnet-4-6*"
    input_per_million: 3.00
    output_per_million: 15.00
  - model: "claude-sonnet-4-5*"
    input_per_million: 3.00
    output_per_million: 15.00
  - model: "claude-sonnet-4-*"
    input_per_million: 3.00
    output_per_million: 15.00
  - model: "claude-3-7-sonnet*"
    input_per_million: 3.00
    output_per_million: 15.00
  - model: "claude-haiku-4-5*"
    input_per_million: 1.00
    output_per_million: 5.00
  - model: "claude-3-5-haiku*"
    input_per_million: 0.80
    output_per_million: 4.00
  - model: "claude-3-opus*"
    input_per_million: 15.00
    output_per_million: 75.00
  - model: "claude-3-haiku*"
    input_per_million: 0.25
    output_per_million: 1.25

  # Gemini
  # For Gemini 3.1 Pro Preview and Gemini 2.5 Pro, the rates below use the
  # standard <=200k prompt tier because this config cannot express tiered pricing.
  - model: "gemini-3.1-pro-preview*"
    input_per_million: 2.00
    output_per_million: 12.00
  - model: "gemini-3.1-flash-lite-preview*"
    input_per_million: 0.25
    output_per_million: 1.50
  - model: "gemini-3-flash-preview*"
    input_per_million: 0.50
    output_per_million: 3.00
  - model: "gemini-2.5-pro*"
    input_per_million: 1.25
    output_per_million: 10.00
  - model: "gemini-2.5-flash-lite*"
    input_per_million: 0.10
    output_per_million: 0.40
  - model: "gemini-2.5-flash*"
    input_per_million: 0.30
    output_per_million: 2.50
  - model: "gemini-2.0-flash*"
    input_per_million: 0.10
    output_per_million: 0.40

# Accounts, groups, and gateway API keys are managed in SQLite via the Admin API.
